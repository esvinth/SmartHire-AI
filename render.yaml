services:
  # ── ML Service (Python/Flask) ──────────────────────────────────
  - type: web
    name: smarthire-ml
    runtime: python
    region: oregon
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
      - key: PYTHON_VERSION
        value: "3.11.6"

  # ── Backend API (Node.js/Express) ──────────────────────────────
  - type: web
    name: smarthire-backend
    runtime: node
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: MONGODB_URI
        sync: false # set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "15m"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "7d"
      - key: ML_SERVICE_URL
        fromService:
          name: smarthire-ml
          type: web
          property: hostport
      - key: FRONTEND_URL
        sync: false # set to your frontend URL after first deploy
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_FILE_SIZE
        value: "5242880"

  # ── Frontend (React + Vite Static Site) ────────────────────────
  - type: web
    name: smarthire-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false # set to your backend URL + /api/v1 after first deploy
